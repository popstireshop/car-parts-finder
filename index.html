<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car Parts Finder</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab { padding: 6px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #1a1a1a; font-size: 14px; cursor: pointer; }
  .tab.active { border: 2px solid #3b82f6; background: #eff6ff; color: #1d4ed8; font-weight: 500; }

  /* Inputs */
  input[type="text"], select { width: 100%; padding: 8px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; background: #fff; color: #1a1a1a; outline: none; }
  input[type="text"]:focus, select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  .vehicle-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  /* Buttons */
  .search-row { display: flex; justify-content: flex-end; margin: 12px 0 1.25rem; }
  .btn-primary { padding: 8px 24px; background: #eff6ff; color: #1d4ed8; border: 0.5px solid #3b82f6; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 14px; }
  .btn-open-all { padding: 7px 16px; background: #eff6ff; color: #1d4ed8; border: 0.5px solid #3b82f6; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 13px; }
  .btn-open { font-size: 12px; padding: 5px 12px; border-radius: 8px; border: 0.5px solid #ccc; background: transparent; color: #1a1a1a; cursor: pointer; flex-shrink: 0; margin-left: auto; }
  .link-toggle { background: none; border: none; color: #3b82f6; cursor: pointer; font-size: 13px; padding: 0; }

  /* Legend */
  .legend-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .legend { display: flex; gap: 16px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #666; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Sections */
  .section-label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .section-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .section-text { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }

  /* Store cards */
  .store-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .store-card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .store-card.off { background: #f5f5f3; opacity: 0.5; }
  .store-card.on { border: 2px solid #3b82f6; }
  .store-logo { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 500; font-size: 11px; flex-shrink: 0; letter-spacing: 0.02em; }
  .store-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Results */
  .results-box { background: #f5f5f3; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 0.5rem; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .results-title { font-size: 14px; font-weight: 500; }
  .result-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .result-logo { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 500; font-size: 10px; flex-shrink: 0; }
  .result-name { font-size: 13px; font-weight: 500; }
  .result-url { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 360px; }
  .hint { font-size: 11px; color: #999; margin-top: 12px; }
  .empty { font-size: 13px; color: #999; text-align: center; padding-top: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>Car Parts Finder</h1>
  <p class="subtitle">Search across major retailers — opens each store with your query pre-filled.</p>

  <!-- Search type tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setType('keyword')">Keyword</button>
    <button class="tab" onclick="setType('part_number')">Part #</button>
    <button class="tab" onclick="setType('vehicle')">By Vehicle</button>
  </div>

  <!-- Search inputs -->
  <div id="input-keyword">
    <input type="text" id="q-keyword" placeholder="e.g. brake pads, alternator, serpentine belt..." onkeydown="if(event.key==='Enter')doSearch()" oninput="resetSearched()" />
  </div>
  <div id="input-part_number" style="display:none">
    <input type="text" id="q-part" placeholder="e.g. 140-10735, ACDelco 17D1367M..." onkeydown="if(event.key==='Enter')doSearch()" oninput="resetSearched()" />
  </div>
  <div id="input-vehicle" style="display:none">
    <div class="vehicle-grid">
      <select id="q-year" onchange="resetSearched()">
        <option value="">Year</option>
        <script>for(let y=2024;y>=1985;y--)document.write(`<option>${y}</option>`)</script>
      </select>
      <select id="q-make" onchange="resetSearched()">
        <option value="">Make</option>
        <script>["Acura","BMW","Chevrolet","Dodge","Ford","Honda","Hyundai","Jeep","Kia","Mazda","Mercedes-Benz","Nissan","Subaru","Toyota","Volkswagen","Volvo"].forEach(m=>document.write(`<option>${m}</option>`))</script>
      </select>
      <input type="text" id="q-model" placeholder="Model (e.g. Camry)" onkeydown="if(event.key==='Enter')doSearch()" oninput="resetSearched()" />
    </div>
  </div>

  <!-- Search button -->
  <div class="search-row">
    <button class="btn-primary" onclick="doSearch()">Search</button>
  </div>

  <!-- Legend + toggle -->
  <div class="legend-row">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div> Wholesalers</div>
      <div class="legend-item"><div class="legend-dot" style="background:#eab308"></div> Need Input</div>
      <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div> Retailers</div>
    </div>
    <button class="link-toggle" onclick="toggleAll()">Deselect all</button>
  </div>

  <!-- Store grid and results -->
  <div id="store-grid"></div>
  <div id="results"></div>
</div>

<script>
  const enc   = encodeURIComponent;
  const plus  = s => enc(s).replace(/%20/g, "+");
  const under = s => enc(s).replace(/%20/g, "_");

  const WHOLESALE_COLOR  = "#16a34a";
  const NEED_INPUT_COLOR = "#eab308";
  const RETAIL_COLOR     = "#dc2626";

  const SECTIONS = [
    { type:"wholesale", label:"Wholesalers", color: WHOLESALE_COLOR  },
    { type:"needinput", label:"Need Input",  color: NEED_INPUT_COLOR },
    { type:"retail",    label:"Retailers",   color: RETAIL_COLOR     },
  ];

  const COLOR_MAP = {
    wholesale: WHOLESALE_COLOR,
    needinput: NEED_INPUT_COLOR,
    retail:    RETAIL_COLOR,
  };

  const STORES = [
    // — Wholesalers —
    { name:"RockAuto (Wholesaler)",                  logo:"RA",  type:"wholesale", search:q=>`https://www.rockauto.com/en/partsearch/?partnum=${enc(q)}`,                                                                                                                  vehicle:(y,mk,mo)=>`https://www.rockauto.com/en/catalog/${enc(mk)},${y}/` },
    { name:"AutoZone (Wholesaler)",                  logo:"AZ",  type:"wholesale", search:q=>`https://www.autozone.com/searchresult?searchText=${enc(q)}`,                                                                                                                 vehicle:(y,mk,mo)=>`https://www.autozone.com/searchresult?searchText=${enc(y+" "+mk+" "+mo)}` },
    { name:"OReilly (Wholesaler)",                   logo:"OR",  type:"wholesale", search:q=>`https://www.oreillyauto.com/search?q=${enc(q)}`,                                                                                                                             vehicle:(y,mk,mo)=>`https://www.oreillyauto.com/search?q=${enc(y+" "+mk+" "+mo)}` },
    { name:"SpeedImage (Wholesaler)",                logo:"SI",  type:"wholesale", search:q=>`https://www.speedimageusa.com/search_adv.asp?keyword=${enc(q)}&sort=relevance&page=1&pageSize=24`,                                                                           vehicle:(y,mk,mo)=>`https://www.speedimageusa.com/search_adv.asp?keyword=${enc(y+" "+mk+" "+mo)}&sort=relevance&page=1&pageSize=24` },
    { name:"System Motorsports (Wholesaler)",        logo:"SM",  type:"wholesale", search:q=>`https://www.systemmotorsports.com/search?q=${enc(q)}`,                                                                                                                       vehicle:(y,mk,mo)=>`https://www.systemmotorsports.com/search?q=${enc(y+" "+mk+" "+mo)}` },
    { name:"Aodhan Wheels (Wholesaler)",             logo:"AW",  type:"wholesale", search:q=>`https://www.aodhanwheels.com/search?q=${plus(q)}`,                                                                                                                           vehicle:(y,mk,mo)=>`https://www.aodhanwheels.com/search?q=${plus(mk+" "+mo)}` },
    { name:"Dobinsons (Wholesaler)",                 logo:"DB",  type:"wholesale", search:q=>`https://dobinsonusa.com/?s=${plus(q)}&post_type=product&type_aws=true`,                                                                                                      vehicle:(y,mk,mo)=>`https://dobinsonusa.com/?s=${plus(mk+" "+mo)}&post_type=product&type_aws=true` },

    // — Need Input —
    { name:"WorldPac (Need Login)",                  logo:"WP",  type:"needinput", search:q=>`https://www.worldpac.com/search?q=${plus(q)}`,                                                                                                                               vehicle:(y,mk,mo)=>`https://www.worldpac.com/search?q=${plus(mk+" "+mo)}` },
    { name:"Turn14 (Need Login)",                    logo:"T14", type:"needinput", search:q=>`https://www.turn14.com/search?q=${enc(q)}`,                                                                                                                                  vehicle:(y,mk,mo)=>`https://www.turn14.com/search?q=${enc(y+" "+mk+" "+mo)}` },
    { name:"Allied Auto Stores (Need Manual Input)", logo:"AL",  type:"needinput", search:q=>`https://www.alliedautoparts.com/search?q=${enc(q)}`,                                                                                                                         vehicle:(y,mk,mo)=>`https://www.alliedautoparts.com/search?q=${enc(y+" "+mk+" "+mo)}` },

    // — Retailers —
    { name:"Advance Auto",                           logo:"AA",  type:"retail",    search:q=>`https://shop.advanceautoparts.com/web/SearchResults?searchTerm=${plus(q)}&autoSuggest=false&recentSearch=false&popularSearch=false&storeId=10151&catalogId=10051&langId=-1`,  vehicle:(y,mk,mo)=>`https://shop.advanceautoparts.com/web/SearchResults?searchTerm=${plus(y+" "+mk+" "+mo)}&autoSuggest=false&recentSearch=false&popularSearch=false&storeId=10151&catalogId=10051&langId=-1` },
    { name:"NAPA",                                   logo:"NP",  type:"retail",    search:q=>`https://www.napaonline.com/en/search?text=${enc(q)}&referer=v2`,                                                                                                             vehicle:(y,mk,mo)=>`https://www.napaonline.com/en/search?text=${enc(y+" "+mk+" "+mo)}&referer=v2` },
    { name:"eBay Motors",                            logo:"eB",  type:"retail",    search:q=>`https://www.ebay.com/sch/i.html?_nkw=${enc(q)}&_sacat=6000`,                                                                                                                vehicle:(y,mk,mo)=>`https://www.ebay.com/sch/i.html?_nkw=${enc(y+" "+mk+" "+mo)}&_sacat=6000` },
    { name:"Amazon",                                 logo:"Am",  type:"retail",    search:q=>`https://www.amazon.com/s?k=${enc(q)}&i=automotive`,                                                                                                                          vehicle:(y,mk,mo)=>`https://www.amazon.com/s?k=${enc(y+" "+mk+" "+mo+" parts")}&i=automotive` },
    { name:"CarParts.com",                           logo:"CP",  type:"retail",    search:q=>`https://www.carparts.com/search?q=${under(q)}`,                                                                                                                              vehicle:(y,mk,mo)=>`https://www.carparts.com/search?q=${under(y+" "+mk+" "+mo)}` },
    { name:"FCP Euro",                               logo:"FC",  type:"retail",    search:q=>`https://www.fcpeuro.com/Parts?keywords=${plus(q)}`,                                                                                                                          vehicle:(y,mk,mo)=>`https://www.fcpeuro.com/Parts?keywords=${plus(y+" "+mk+" "+mo)}` },
    { name:"ECS Tuning",                             logo:"EC",  type:"retail",    search:q=>`https://www.ecstuning.com/Search/SiteSearch/${enc(q.replace(/\s+/g,"_"))}/`,                                                                                                vehicle:(y,mk,mo)=>`https://www.ecstuning.com/Search/SiteSearch/${enc((y+"_"+mk+"_"+mo).replace(/\s+/g,"_"))}/` },
    { name:"Pelican Parts",                          logo:"PP",  type:"retail",    search:q=>`https://www.pelicanparts.com/search/?q=${plus(q)}`,                                                                                                                          vehicle:(y,mk,mo)=>`https://www.pelicanparts.com/search/?q=${plus(mk+" "+y+" "+mo)}` },
    { name:"Summit Racing",                          logo:"SR",  type:"retail",    search:q=>`https://www.summitracing.com/search?keyword=${enc(q)}`,                                                                                                                      vehicle:(y,mk,mo)=>`https://www.summitracing.com/search?keyword=${enc(y+" "+mk+" "+mo)}` },
    { name:"JEGS",                                   logo:"JG",  type:"retail",    search:q=>`https://www.jegs.com/webapp/wcs/stores/servlet/SearchResultsPageCmd?q=${plus(q)}&storeId=10001&catalogId=10002&langId=-1&channelSource=WEB`,                                 vehicle:(y,mk,mo)=>`https://www.jegs.com/webapp/wcs/stores/servlet/SearchResultsPageCmd?q=${plus(y+" "+mk+" "+mo)}&storeId=10001&catalogId=10002&langId=-1&channelSource=WEB` },
  ];

  let searchType = "keyword";
  let selected   = new Set(STORES.map(s => s.name));
  let searched   = false;

  function setType(t) {
    searchType = t;
    ["keyword","part_number","vehicle"].forEach(id => {
      document.getElementById("input-"+id).style.display = id===t ? "" : "none";
    });
    document.querySelectorAll(".tab").forEach((el,i) => {
      el.classList.toggle("active", ["keyword","part_number","vehicle"][i]===t);
    });
    resetSearched();
  }

  function resetSearched() { searched = false; renderResults(); }

  function getQuery() {
    if (searchType==="part_number") return document.getElementById("q-part").value.trim();
    return document.getElementById("q-keyword").value.trim();
  }

  function isValid() {
    if (searchType==="keyword")     return document.getElementById("q-keyword").value.trim().length > 0;
    if (searchType==="part_number") return document.getElementById("q-part").value.trim().length > 0;
    return document.getElementById("q-year").value &&
           document.getElementById("q-make").value &&
           document.getElementById("q-model").value.trim().length > 0;
  }

  function getUrl(store) {
    if (searchType==="vehicle") {
      const y  = document.getElementById("q-year").value;
      const mk = document.getElementById("q-make").value;
      const mo = document.getElementById("q-model").value.trim();
      return store.vehicle(y, mk, mo);
    }
    return store.search(getQuery());
  }

  function selectedStores() { return STORES.filter(s => selected.has(s.name)); }

  function toggleStore(name) {
    selected.has(name) ? selected.delete(name) : selected.add(name);
    renderStores();
    renderResults();
  }

  function toggleAll() {
    const allOn = STORES.every(s => selected.has(s.name));
    STORES.forEach(s => allOn ? selected.delete(s.name) : selected.add(s.name));
    renderStores();
    renderResults();
  }

  function doSearch() {
    if (!isValid()) return;
    searched = true;
    renderResults();
  }

  function openAll() { selectedStores().forEach(s => window.open(getUrl(s), "_blank")); }

  function renderStores() {
    const allOn = STORES.every(s => selected.has(s.name));
    document.querySelector(".link-toggle").textContent = allOn ? "Deselect all" : "Select all";
    document.getElementById("store-grid").innerHTML = SECTIONS.map(sec => {
      const stores = STORES.filter(s => s.type === sec.type);
      return `
        <div style="margin-bottom:0.75rem">
          <div class="section-label">
            <div class="section-dot" style="background:${sec.color}"></div>
            <span class="section-text">${sec.label}</span>
          </div>
          <div class="store-grid">
            ${stores.map(s => `
              <div class="store-card ${selected.has(s.name) ? "on" : "off"}" onclick="toggleStore(${JSON.stringify(s.name)})">
                <div class="store-logo" style="background:${COLOR_MAP[s.type]}">${s.logo}</div>
                <div style="min-width:0;flex:1">
                  <div class="store-name">${s.name}</div>
                </div>
              </div>`).join("")}
          </div>
        </div>`;
    }).join("");
  }

  function renderResults() {
    const box = document.getElementById("results");
    const sv  = selectedStores();
    if (!searched || sv.length === 0) {
      box.innerHTML = `<p class="empty">Select your stores, enter a search, and hit Search —<br>each store opens with your query pre-filled.</p>`;
      return;
    }
    box.innerHTML = `
      <div class="results-box">
        <div class="results-header">
          <span class="results-title">Open search in ${sv.length} store${sv.length !== 1 ? "s" : ""}</span>
          <button class="btn-open-all" onclick="openAll()">Open all tabs</button>
        </div>
        ${sv.map(s => `
          <div class="result-row">
            <div class="result-logo" style="background:${COLOR_MAP[s.type]}">${s.logo}</div>
            <div style="flex:1;min-width:0">
              <div class="result-name">${s.name}</div>
              <div class="result-url">${getUrl(s)}</div>
            </div>
            <button class="btn-open" onclick="window.open(${JSON.stringify(getUrl(s))}, '_blank')">Open →</button>
          </div>`).join("")}
        <p class="hint">Each store opens in a new tab with your search pre-filled. Allow pop-ups if prompted.</p>
      </div>`;
  }

  renderStores();
  renderResults();
</script>
</body>
</html>
